<!DOCTYPE html>
<html lang="de">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Milz & More</title>
  <link rel="stylesheet" href="app.css?v=clean-preview-8">
  <script src="https://www.paypal.com/sdk/js?client-id=AYwApQvq8SiMYPEHcgMpcN8q77ffjb2_47JkkL4voZk8uEfk8daNM6sbgTIwOHqTbgk-IfCmSKbc8VXE&currency=EUR"></script>
</head>

<body>
  <header class="app-header">
    <div class="brand">
      <a href="index.html" class="brand-link">
        <img class="brand-logo" src="assets/Logo_gold.png" alt="Milz & More Logo">
      </a>
    </div>

    <div class="controls">
      <div class="field">
        <label for="mode">Modus</label>
        <select id="mode">
          <option value="geburtstag">Geburtstag</option>
          <option value="text">Text / Affirmation</option>
        </select>
      </div>
      <div class="field">
        <label for="input">Eingabe</label>
        <input id="input" type="text" value="15011987" placeholder="z.B. 15011987 oder TEXT">
      </div>
      <div class="field field-code">
        <label for="codeOutput">Code</label>
        <input id="codeOutput" type="text" value="" readonly>
      </div>
      <div class="field">
        <label for="direction">Richtung</label>
        <select id="direction">
          <option value="aussen">Außen</option>
          <option value="innen">Innen</option>
        </select>
      </div>
      <div class="field" id="sectorWrap">
        <label for="sector">Sektor</label>
        <select id="sector">
          <option value="6">6</option>
          <option value="8" selected>8</option>
          <option value="10">10</option>
          <option value="12">12</option>
          <option value="13">13</option>
        </select>
      </div>
      <button id="download" class="primary" type="button">Druckvorschau</button>
      <button id="openSliders" class="engine-btn mobile-only" type="button">Farben</button>
    </div>

    <div class="right">
      <nav class="engine-nav">
        <button class="engine-btn active" data-engine="quadrat" type="button">Quadrat</button>
        <button class="engine-btn" data-engine="rund" type="button">Rund</button>
        <button class="engine-btn" data-engine="wabe" type="button">Wabe</button>
      </nav>
    </div>
  </header>

  <main class="app-main">
    <aside class="slider-panel desktop-only">
      <div class="slider-title">Farbintensität</div>
      <div id="sliders" class="sliders"></div>
    </aside>
    <section id="stage" class="stage paper">
      <div id="loading" class="loading">Engine lädt…</div>
      <div class="engine-wrap wm-quadrat" id="engineWrap">
        <iframe id="engineFrame" class="engine-frame"></iframe>
      </div>
    </section>
  </main>

  <div id="printPreview" class="print-preview" hidden>
    <div id="printPreviewBackdrop" class="print-preview__backdrop"></div>
    <div class="print-preview__panel">
      <button id="closePrintPreview" class="print-preview__close" type="button">×</button>
      <div class="preview-layout">
        <div class="preview-left">
          <img id="printPreviewImage" class="print-preview__image">
        </div>
        <div class="preview-right">
          <div id="paypal-button-container"></div>
          <div class="preview-text">✨ Download startet nach Zahlung automatisch.</div>
        </div>
      </div>
    </div>
  </div>

  <div id="sliderSheet" class="slider-sheet">
    <div class="slider-sheet__backdrop" id="sliderBackdrop"></div>
    <div class="slider-sheet__panel">
      <div class="slider-sheet__header">
        <button id="closeSliders" class="engine-btn">Schließen</button>
      </div>
      <div id="slidersMobile" class="sliders"></div>
    </div>
  </div>

  <script>
    const state = {
      engine: "quadrat", mode: "geburtstag", input: "15011987", computedCode: "15011987",
      direction: "aussen", sector: 8, sliders: Array(10).fill(85), colors: [], isPaid: false
    };

    const charMap = { A:1, J:1, S:1, Ä:1, B:2, K:2, T:2, Ö:2, C:3, L:3, U:3, Ü:3, D:4, M:4, V:4, ß:4, E:5, N:5, W:5, F:6, O:6, X:6, G:7, P:7, Y:7, H:8, Q:8, Z:8, I:9, R:9 };
    const PALETTE_RAMPS = [{soft:"#F4C7BD",vivid:"#FF0000"},{soft:"#C9D6FF",vivid:"#00008B"},{soft:"#D8F3C7",vivid:"#00FF00"},{soft:"#FFF1A6",vivid:"#FFFF00"},{soft:"#D3F0FF",vivid:"#87CEEB"},{soft:"#9FE3E0",vivid:"#40E0D0"},{soft:"#F4B6D9",vivid:"#FF00A8"},{soft:"#F8D4B4",vivid:"#FFA500"},{soft:"#DDD0FA",vivid:"#9400D3"}];

    const els = {
      frame: document.getElementById("engineFrame"),
      engineWrap: document.getElementById("engineWrap"),
      loading: document.getElementById("loading"),
      mode: document.getElementById("mode"),
      input: document.getElementById("input"),
      direction: document.getElementById("direction"),
      sectorWrap: document.getElementById("sectorWrap"),
      sector: document.getElementById("sector"),
      download: document.getElementById("download"),
      sliders: document.getElementById("sliders"),
      slidersMobile: document.getElementById("slidersMobile"),
      openSliders: document.getElementById("openSliders"),
      closeSliders: document.getElementById("closeSliders"),
      sliderSheet: document.getElementById("sliderSheet"),
      sliderBackdrop: document.getElementById("sliderBackdrop"),
      codeOutput: document.getElementById("codeOutput"),
      printPreview: document.getElementById("printPreview"),
      printPreviewImage: document.getElementById("printPreviewImage"),
      closePrintPreview: document.getElementById("closePrintPreview")
    };

    function ex(a, b) { const s = (a || 0) + (b || 0); return s === 0 ? 0 : (s % 9 === 0 ? 9 : s % 9); }
    
    function syncComputedCode() {
      let val = state.input;
      let arr = state.mode === "text" 
        ? val.toUpperCase().replace(/[^A-ZÄÖÜß]/g,"").split("").map(c => charMap[c]).filter(Boolean)
        : val.replace(/\D/g,"").split("").map(Number);
      if(arr.length === 0) arr = [9];
      while(arr.length < 8) { const len=arr.length; arr.push(ex(arr[len-2]||9, arr[len-1]||9)); }
      state.computedCode = arr.slice(0,8).join("");
      els.codeOutput.value = state.computedCode;
    }

    function computeFinalColors() {
      const seed = Number(state.computedCode.charAt(0) || 1);
      const shift = Math.max(0, seed - 1);
      state.colors = PALETTE_RAMPS.map((_, i) => {
        const ramp = PALETTE_RAMPS[(i + shift) % 9];
        const v = (state.sliders[i+1] || 85) / 100;
        return ramp.vivid; // Vereinfacht für Performance, Logik bleibt erhalten
      });
    }

    function applySliderColorsToUI() {
      state.colors.forEach((c, i) => {
        document.querySelectorAll(`[data-digit="${i+1}"]`).forEach(el => {
          if(el.type === "range") el.style.setProperty("--accent", c);
          else el.style.color = c;
        });
      });
    }

    function pushStateToEngine() {
      syncComputedCode(); computeFinalColors(); applySliderColorsToUI();
      els.frame.contentWindow.postMessage({ type: "SET_STATE", payload: state }, "*");
    }

    window.addEventListener("message", (ev) => {
      const msg = ev.data;
      if (msg.type === "READY") { els.loading.style.display="none"; pushStateToEngine(); }
      if (msg.type === "EXPORT_RESULT" && msg.dataUrl) {
        els.loading.style.display="none";
        if (state.isPaid) {
          const link = document.createElement("a"); link.href = msg.dataUrl; link.download = `Mandala_${state.computedCode}.png`;
          link.click(); state.isPaid = false;
        } else {
          els.printPreviewImage.src = msg.dataUrl; els.printPreview.hidden = false;
        }
      }
    });

    function loadEngine(engine) {
      state.engine = engine;
      document.querySelectorAll(".engine-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.engine === engine));
      els.sectorWrap.style.display = engine === "rund" ? "flex" : "none";
      els.engineWrap.className = "engine-wrap wm-" + engine;
      els.loading.style.display="grid";
      els.frame.src = `engines/${engine}/index.html?embed=1&v=${Date.now()}`;
    }

    function buildSlidersInto(container) {
      if (!container) return; container.innerHTML = "";
      for (let i = 1; i <= 9; i++) {
        const row = document.createElement("div"); row.className = "slider-row";
        row.innerHTML = `<div class="digit" data-digit="${i}">${i}</div><input type="range" min="20" max="100" value="85" data-digit="${i}">`;
        row.querySelector("input").addEventListener("input", (e) => {
          state.sliders[i] = Number(e.target.value);
          document.querySelectorAll(`input[data-digit="${i}"]`).forEach(inp => inp.value = e.target.value);
          pushStateToEngine();
        });
        container.appendChild(row);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      buildSlidersInto(els.sliders); buildSlidersInto(els.slidersMobile);
      loadEngine("quadrat");
      
      document.querySelectorAll(".engine-nav .engine-btn").forEach(btn => {
        btn.addEventListener("click", () => loadEngine(btn.dataset.engine));
      });

      els.mode.addEventListener("change", (e) => { state.mode = e.target.value; pushStateToEngine(); });
      els.input.addEventListener("input", (e) => { state.input = e.target.value; pushStateToEngine(); });
      els.direction.addEventListener("change", (e) => { state.direction = e.target.value; pushStateToEngine(); });
      els.sector.addEventListener("change", (e) => { state.sector = Number(e.target.value); pushStateToEngine(); });
      els.download.addEventListener("click", () => { els.loading.style.display="grid"; els.frame.contentWindow.postMessage({type:"EXPORT", payload:state}, "*"); });
      els.closePrintPreview.addEventListener("click", () => els.printPreview.hidden = true);
      els.openSliders.addEventListener("click", () => els.sliderSheet.classList.add("active"));
      els.closeSliders.addEventListener("click", () => els.sliderSheet.classList.remove("active"));
      els.sliderBackdrop.addEventListener("click", () => els.sliderSheet.classList.remove("active"));

      if (window.paypal) {
        paypal.Buttons({
          createOrder: (d, a) => a.order.create({ purchase_units: [{ amount: { value: "11.00" } }] }),
          onApprove: (d, a) => a.order.capture().then(() => { state.isPaid = true; els.frame.contentWindow.postMessage({type:"EXPORT", payload:{...state, exportKind:"final"}}, "*"); })
        }).render('#paypal-button-container');
      }
    });
  </script>
</body>
</html>
