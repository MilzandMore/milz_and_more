<!DOCTYPE html>
<html lang="de">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Milz & More</title>
  <meta name="theme-color" content="#c9a14a">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

  <link rel="stylesheet" href="app.css">
</head>

<body>

<header class="app-header">
  <img class="brand-logo" src="assets/Logo_gold.png">
</header>

<main class="app-main">
  <section id="stage" class="stage">

    <div class="engine-wrap wm-quadrat" id="engineWrap">
      <iframe id="engineFrame" class="engine-frame"></iframe>

      <div class="viewer-watermark">
        <img src="assets/Logo_gold.png">
      </div>
    </div>

    <button id="download" class="primary">Druckvorschau</button>

  </section>
</main>

<div id="printPreview" class="print-preview" hidden>

  <div class="print-preview__panel">

    <button id="closePrintPreview">X</button>

    <button id="buyPreviewPng">
      ✨ Dein Mandala freischalten – 11€
    </button>

    <img id="printPreviewImage">

    <div id="printPreviewCaption">
      Vorschau mit Wasserzeichen<br>
      <strong>Einführungspreis: 11€</strong>
    </div>

  </div>

</div>

<script>
const PAYMENT_URL = "https://www.paypal.com/ncp/payment/G7ZXADZZXL73L";
const IS_ADMIN = new URLSearchParams(window.location.search).get("admin") === "1";

const els = {
  frame: document.getElementById("engineFrame"),
  download: document.getElementById("download"),
  printPreview: document.getElementById("printPreview"),
  printPreviewImage: document.getElementById("printPreviewImage"),
  printPreviewCaption: document.getElementById("printPreviewCaption"),
  closePrintPreview: document.getElementById("closePrintPreview"),
  buyPreviewPng: document.getElementById("buyPreviewPng")
};

function openPrintPreview(dataUrl) {
  els.printPreviewImage.src = dataUrl;
  els.printPreview.hidden = false;

  if (IS_ADMIN) {
    document.querySelector(".viewer-watermark").style.display = "none";
    els.printPreviewCaption.innerHTML = "Admin-Modus – Download ohne Wasserzeichen";
  }
}

function closePrintPreview() {
  els.printPreview.hidden = true;
}

function handlePaidDownload() {

  if (IS_ADMIN) {
    requestExport();
    return;
  }

  window.open(PAYMENT_URL, "_blank");
}

function requestExport() {
  els.frame.contentWindow.postMessage({ type: "EXPORT" }, "*");
}

function loadEngine() {
  els.frame.src = "engines/quadrat/index.html";
}

window.addEventListener("message", (ev) => {
  if (ev.data.type === "EXPORT_RESULT") {
    openPrintPreview(ev.data.dataUrl);
  }
});

els.download.addEventListener("click", requestExport);
els.closePrintPreview.addEventListener("click", closePrintPreview);
els.buyPreviewPng.addEventListener("click", handlePaidDownload);

loadEngine();
</script>

</body>
</html>
