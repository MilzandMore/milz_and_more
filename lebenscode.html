<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lebenscode Mandala</title>
<link rel="stylesheet" href="app.css?v=final-2">
</head>

<body>

<header class="app-header">

<div class="brand">
<a href="index.html" class="brand-link">
<img class="brand-logo" src="assets/Logo_gold.png" alt="Milz & More Logo">
</a>
</div>

<div class="controls">

<div class="field">
<label>Modus</label>
<select id="mode">
<option value="geburtstag">Geburtstag</option>
<option value="text">Text / Affirmation</option>
</select>
</div>

<div class="field">
<label>Eingabe</label>
<input id="input" type="text" value="15011987">
</div>

<div class="field field-code">
<label>Code</label>
<input id="codeOutput" type="text" readonly>
</div>

<div class="field">
<label>Richtung</label>
<select id="direction">
<option value="aussen">Außen</option>
<option value="innen">Innen</option>
</select>
</div>

<div class="field" id="sectorWrap">
<label>Sektor</label>
<select id="sector">
<option value="6">6</option>
<option value="8" selected>8</option>
<option value="10">10</option>
<option value="12">12</option>
<option value="13">13</option>
</select>
</div>

<button id="download" class="primary">Download</button>
<button id="openSliders" class="engine-btn mobile-only">Farben</button>

</div>

<div class="right">

<label class="toggle">
<input id="paperToggle" type="checkbox" checked>
</label>

<nav class="engine-nav">
<button class="engine-btn active" data-engine="quadrat">Quadrat</button>
<button class="engine-btn" data-engine="rund">Rund</button>
<button class="engine-btn" data-engine="wabe">Wabe</button>
</nav>

</div>

</header>

<main class="app-main">

<aside class="slider-panel desktop-only">
<div class="slider-title">Farbintensität</div>
<div id="sliders" class="sliders"></div>
<div class="hint">Tipp: Slider regeln Sättigung/Helligkeit je Ziffer.</div>
</aside>

<section id="stage" class="stage paper">
<div id="loading" class="loading">Engine lädt…</div>
<iframe id="engineFrame" class="engine-frame"></iframe>
</section>

</main>

<div id="sliderSheet" class="slider-sheet">
<div class="slider-sheet__backdrop" id="sliderBackdrop"></div>

<div class="slider-sheet__panel">
<div class="slider-sheet__header">
<div class="slider-sheet__title">Farbintensität</div>
<button id="closeSliders" class="engine-btn">Schließen</button>
</div>

<div class="slider-sheet__body">
<div id="slidersMobile" class="sliders"></div>
</div>
</div>
</div>

<script>

const state={
engine:"quadrat",
mode:"geburtstag",
input:"15011987",
computedCode:"15011987",
direction:"aussen",
sector:8,
sliders:Array(10).fill(85),
paperLook:true
};

const charMap={
A:1,J:1,S:1,Ä:1,
B:2,K:2,T:2,Ö:2,
C:3,L:3,U:3,Ü:3,
D:4,M:4,V:4,ß:4,
E:5,N:5,W:5,
F:6,O:6,X:6,
G:7,P:7,Y:7,
H:8,Q:8,Z:8,
I:9,R:9
};

const els={
frame:document.getElementById("engineFrame"),
mode:document.getElementById("mode"),
input:document.getElementById("input"),
direction:document.getElementById("direction"),
sector:document.getElementById("sector"),
codeOutput:document.getElementById("codeOutput"),
download:document.getElementById("download"),
sliders:document.getElementById("sliders"),
slidersMobile:document.getElementById("slidersMobile"),
openSliders:document.getElementById("openSliders"),
closeSliders:document.getElementById("closeSliders"),
sliderSheet:document.getElementById("sliderSheet"),
sliderBackdrop:document.getElementById("sliderBackdrop"),
paperToggle:document.getElementById("paperToggle")
};

function ex(a,b){
const s=(a||0)+(b||0);
return s===0?0:(s%9===0?9:s%9);
}

function codeFromDate(str){
let raw=String(str||"").replace(/\D/g,"").split("").map(Number);
while(raw.length<8)raw.push(0);
return raw.slice(0,8);
}

function codeFromText(text){

let arr=String(text||"")
.toUpperCase()
.replace(/[^A-ZÄÖÜß]/g,"")
.split("")
.map(c=>charMap[c])
.filter(Boolean);

if(arr.length===0)arr=[9];

while(arr.length>8){
let next=[];
for(let i=0;i<arr.length-1;i++){
next.push(ex(arr[i],arr[i+1]));
}
arr=next;
}

while(arr.length<8){
let l=arr.length;
arr.push(ex(arr[l-2],arr[l-1]));
}

return arr.slice(0,8);

}

function getCode(){

let codeArr=state.mode==="text"
?codeFromText(state.input)
:codeFromDate(state.input);

state.computedCode=codeArr.join("");
els.codeOutput.value=state.computedCode;

return state.computedCode;

}

function pushState(){

const payload={
...state,
mode:"geburtstag",
input:getCode()
};

els.frame.contentWindow.postMessage(
{type:"SET_STATE",payload},
"*"
);

}

function loadEngine(engine){

state.engine=engine;

document.querySelectorAll(".engine-btn")
.forEach(b=>b.classList.toggle("active",b.dataset.engine===engine));

els.frame.src=`engines/${engine}/index.html?embed=1&v=${Date.now()}`;

}

function buildSliders(container){

container.innerHTML="";

for(let i=1;i<=9;i++){

const row=document.createElement("div");
row.className="slider-row";

const dot=document.createElement("div");
dot.className="dot";

const digit=document.createElement("div");
digit.className="digit";
digit.textContent=i;

const input=document.createElement("input");
input.type="range";
input.min="20";
input.max="100";
input.value=state.sliders[i];

input.addEventListener("input",()=>{
state.sliders[i]=Number(input.value);
pushState();
});

row.append(dot,digit,input);
container.appendChild(row);

}

}

function openSheet(){
els.sliderSheet.classList.add("open");
}

function closeSheet(){
els.sliderSheet.classList.remove("open");
}

document.querySelectorAll(".engine-btn")
.forEach(btn=>{
btn.addEventListener("click",()=>loadEngine(btn.dataset.engine));
});

els.mode.addEventListener("change",()=>{
state.mode=els.mode.value;
pushState();
});

els.input.addEventListener("input",()=>{
state.input=els.input.value;
pushState();
});

els.direction.addEventListener("change",()=>{
state.direction=els.direction.value;
pushState();
});

els.sector.addEventListener("change",()=>{
state.sector=Number(els.sector.value);
pushState();
});

els.download.addEventListener("click",()=>{
els.frame.contentWindow.postMessage(
{type:"EXPORT",payload:state},
"*"
);
});

els.openSliders.addEventListener("click",openSheet);
els.closeSliders.addEventListener("click",closeSheet);
els.sliderBackdrop.addEventListener("click",closeSheet);

buildSliders(els.sliders);
buildSliders(els.slidersMobile);

getCode();
loadEngine("quadrat");

</script>

</body>
</html>
