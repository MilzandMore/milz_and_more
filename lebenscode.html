<!-- 🔒 NEU: GLOBALER RECHTSKLICK-SCHUTZ -->
<script>
(function () {

  function blockContextMenu() {
    document.addEventListener("contextmenu", function (e) {
      e.preventDefault();
    });
  }

  // sofort aktiv
  blockContextMenu();

  // extra Absicherung (falls etwas überschreibt)
  window.addEventListener("load", blockContextMenu);
  setTimeout(blockContextMenu, 500);

  // speziell für Print Preview (dein Problemfall)
  const preview = document.getElementById("printPreview");

  if (preview) {
    preview.addEventListener("contextmenu", function (e) {
      e.preventDefault();
    });
  }

})();
</script>
