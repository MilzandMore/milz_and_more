<!DOCTYPE html>
<html lang="de">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Lebenscode App</title>
  <meta name="description" content="Interaktive Lebenscode App">
  <meta name="theme-color" content="#c9a14a">

  <link rel="manifest" href="manifest.json">

  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Lebenscode">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="stylesheet" href="app.css">
</head>

<body class="portal-body">
  <main class="portal">
    <div class="portal-card">

      <img
        class="portal-logo"
        src="assets/Logo_gold.png"
        alt="Milz & More"
      >

      <div class="portal-tagline">
        DEIN DESIGN. DEIN URSPRUNG. DEIN WEG.
      </div>

      <div class="portal-spacer"></div>

      <div class="portal-actions">
        <a class="portal-pill portal-pill--primary" href="lebenscode.html">
          <span>Lebenscode Mandala</span>
          <span class="portal-pill__hint">öffnen</span>
        </a>

        <button class="portal-pill portal-pill--disabled" type="button" disabled>
          <span>New Project</span>
          <span class="portal-pill__hint">coming soon</span>
        </button>

        <button class="portal-pill portal-pill--disabled" type="button" disabled>
          <span>New Project</span>
          <span class="portal-pill__hint">coming soon</span>
        </button>
      </div>

    </div>
  </main>

  <!-- Service Worker (MUSS im body sein, nicht oben!) -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js")
        .then(() => console.log("Service Worker registriert"))
        .catch((err) => console.log("SW Fehler:", err));
    }
  </script>

</body>
</html>
